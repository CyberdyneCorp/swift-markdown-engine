name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openspec:
    name: OpenSpec validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @fission-ai/openspec@latest
      - run: openspec validate --all --strict

  test:
    name: Build & test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          # Pick the newest installed Xcode 26.x, else the newest Xcode, else the default.
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          XCODE=${XCODE:-$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)}
          XCODE=${XCODE:-/Applications/Xcode.app}
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
      - name: Swift build & test
        run: swift test

  cross-platform:
    name: Build (${{ matrix.platform }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: 'generic/platform=iOS Simulator'
          - platform: watchOS
            destination: 'generic/platform=watchOS Simulator'
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          # Pick the newest installed Xcode 26.x, else the newest Xcode, else the default.
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          XCODE=${XCODE:-$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)}
          XCODE=${XCODE:-/Applications/Xcode.app}
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
      - name: Build core for ${{ matrix.platform }}
        run: >
          xcodebuild build
          -scheme SwiftMarkdownEngine
          -destination '${{ matrix.destination }}'
          -quiet

  e2e:
    name: E2E (XCUITest, ${{ matrix.device }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        device: [iPhone, iPad]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          # Pick the newest installed Xcode 26.x, else the newest Xcode, else the default.
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          XCODE=${XCODE:-$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)}
          XCODE=${XCODE:-/Applications/Xcode.app}
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate project
        working-directory: E2E/MarkdownE2E
        run: xcodegen generate
      - name: Run XCUITest on a ${{ matrix.device }} simulator
        working-directory: E2E/MarkdownE2E
        run: |
          ID=$(xcrun simctl list devices available | grep -m1 "${{ matrix.device }}" | grep -oE '[0-9A-F-]{36}')
          echo "Using simulator $ID"
          xcodebuild test \
            -project MarkdownE2E.xcodeproj \
            -scheme MarkdownE2E \
            -destination "platform=iOS Simulator,id=$ID" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

  e2e-mac:
    name: E2E (XCUITest, macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          # Pick the newest installed Xcode 26.x, else the newest Xcode, else the default.
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          XCODE=${XCODE:-$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)}
          XCODE=${XCODE:-/Applications/Xcode.app}
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate project
        working-directory: E2E/MarkdownE2E
        run: xcodegen generate
      - name: Run XCUITest on macOS
        working-directory: E2E/MarkdownE2E
        run: >
          xcodebuild test
          -project MarkdownE2E.xcodeproj
          -scheme MarkdownE2E-mac
          -destination 'platform=macOS'
          CODE_SIGN_IDENTITY=-
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGNING_ALLOWED=YES
          -quiet

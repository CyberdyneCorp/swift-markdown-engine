name: PencilNotes
options:
  bundleIdPrefix: ai.cyberdyne.pencilnotes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  SwiftMarkdownEngine:
    path: ../..

targets:
  PencilNotes:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: SwiftMarkdownEngine
        product: SwiftMarkdownEngine
      - package: SwiftMarkdownEngine
        product: MarkdownEditor
      - package: SwiftMarkdownEngine
        product: MarkdownEngineCodeBlocks
      - package: SwiftMarkdownEngine
        product: MarkdownEngineLatex
    info:
      path: App/Info.generated.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.cyberdyne.pencilnotes.app
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        CODE_SIGNING_ALLOWED: NO

schemes:
  PencilNotes:
    build:
      targets:
        PencilNotes: all

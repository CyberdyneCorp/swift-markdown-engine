# XcodeGen spec for the PencilNotes example app.
#
# Generate via the wrapper script (NOT bare xcodegen):
#   scripts/generate-pencilnotes.sh
#
# The app is opened through the repo-root PencilNotes.xcworkspace, which lists the
# engine package as a workspace MEMBER. The app target links the package PRODUCTS
# only — the post-generate strip step removes XcodeGen's project-level
# XCLocalSwiftPackageReference, because Xcode 16+ refuses to resolve a local package
# that is an ancestor of the .xcodeproj (it shows a stuck "?"). With the package
# supplied by the workspace instead, there is no ancestor reference to choke on.
name: PencilNotes
options:
  bundleIdPrefix: ai.cyberdynecorp.pencilnotes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Automatic signing for device builds. The team is encoded here so regeneration
# preserves it — change DEVELOPMENT_TEAM for your own account.
settings:
  base:
    DEVELOPMENT_TEAM: 2C69VJZSNR
    CODE_SIGN_STYLE: Automatic

packages:
  SwiftMarkdownEngine:
    path: ../..

targets:
  PencilNotes:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: SwiftMarkdownEngine
        product: SwiftMarkdownEngine
      - package: SwiftMarkdownEngine
        product: MarkdownEditor
      - package: SwiftMarkdownEngine
        product: MarkdownEngineCodeBlocks
      - package: SwiftMarkdownEngine
        product: MarkdownEngineLatex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.cyberdynecorp.pencilnotes.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"

  PencilNotesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: PencilNotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.cyberdynecorp.pencilnotes.uitests
        TEST_TARGET_NAME: PencilNotes
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"

schemes:
  PencilNotes:
    build:
      targets:
        PencilNotes: all
        PencilNotesUITests: [test]
    test:
      targets:
        - PencilNotesUITests
